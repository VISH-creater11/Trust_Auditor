<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trust Auditor | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .trust-high { border-left: 5px solid #198754; }
        .trust-mod { border-left: 5px solid #ffc107; }
        .trust-low { border-left: 5px solid #dc3545; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🛡️ Trust Auditor Hybrid Fusion</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form action="/audit" method="POST" class="row g-3">
                    <div class="col-md-10">
                        <input type="text" name="domain" class="form-control" placeholder="Enter domain to audit (e.g., google.com)" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Analyze</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-header bg-white font-weight-bold">Active Assets & Risk Ranking</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Rank</th>
                            <th>Domain</th>
                            <th>Hybrid Score</th>
                            <th>Trust Level</th>
                            <th>Trend</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in results %}
                        <tr class="{% if item.trust_level == 'High Trust' %}trust-high{% elif item.trust_level == 'Moderate Trust' %}trust-mod{% else %}trust-low{% endif %}">
                            <td>#{{ item.risk_rank }}</td>
                            <td><strong>{{ item.domain }}</strong></td>
                            <td>{{ item.hybrid_score }}</td>
                            <td>
                                <span class="badge {% if item.trust_level == 'High Trust' %}bg-success{% elif item.trust_level == 'Moderate Trust' %}bg-warning text-dark{% else %}bg-danger{% endif %}">
                                    {{ item.trust_level }}
                                </span>
                            </td>
                            <td>{{ item.trust_trend }}</td>
                            <td><a href="/report/{{ item.domain }}" class="btn btn-sm btn-outline-dark">Deep Scan Report</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
